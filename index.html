  // Sidebar/burger/popover wiring (idempotent)
  function wireShell() {
    if (window.__lmsShellWired) return;
    window.__lmsShellWired = true;

    document.addEventListener('click', function (e) {
      // 1) data-action handlers ก่อน hash interceptor
      var actEl = e.target.closest && e.target.closest('[data-action]');
      if (actEl) {
        var act = actEl.getAttribute('data-action');
        if (act === 'logout') {
          e.preventDefault();
          var pop = $('.nav-profile-popover'); if (pop) pop.remove();
          doLogout();
          return;
        }
      }

      // 2) data-modal-close
      var closeEl = e.target.closest && e.target.closest('[data-modal-close]');
      if (closeEl) { e.preventDefault(); Modal.close(); return; }

      // 3) burger
      var burger = e.target.closest && e.target.closest('#nav-burger');
      if (burger) { e.preventDefault(); toggleSidebar(); return; }
      var bd = e.target.closest && e.target.closest('#sidebar-backdrop');
      if (bd) { closeSidebar(); return; }

      // 4) profile popover toggle
      var pBtn = e.target.closest && e.target.closest('#nav-profile-btn');
      if (pBtn) { e.preventDefault(); toggleProfilePopover(); return; }

      // 5) Outside click for popover
      var pop2 = $('.nav-profile-popover');
      if (pop2 && !e.target.closest('.nav-profile-popover') && !e.target.closest('#nav-profile-btn')) {
        pop2.remove();
      }

      // 6) Modal backdrop click → close
      if (e.target.id === 'modal-host') { Modal.close(); return; }

      // 7) Hash links
      var a = e.target.closest && e.target.closest('a[href]');
      if (a) {
        var href = a.getAttribute('href');
        if (href && href.charAt(0) === '#') {
          if (href === '#') return;
          if (a.target && a.target !== '_top' && a.target !== '_self') return;
          e.preventDefault();
          // close mobile sidebar after click
          if (window.innerWidth <= 1024) setTimeout(closeSidebar, 50);
          if (href === location.hash) dispatch();
          else location.hash = href;
        }
      }
    }, true);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        Modal.close();
        var pop = $('.nav-profile-popover'); if (pop) pop.remove();
        closeSidebar();
      }
    });

    window.addEventListener('hashchange', dispatch);
    window.addEventListener('resize', function () {
      if (window.innerWidth > 1024) closeSidebar();
    });
  }
  function toggleSidebar() {
    var sb = $('#sidebar'); var bd = $('#sidebar-backdrop');
    if (!sb) return;
    var open = sb.classList.toggle('open');
    if (bd) bd.classList.toggle('show', open);

        + '<div class="field"><label>ยืนยันรหัสผ่านใหม่ <span class="req">*</span></label>'

  function doLogout() {
    confirmModal({ title: 'ออกจากระบบ?', message: 'คุณจะถูกพากลับไปยังหน้าเข้าสู่ระบบ', okText: 'ออกจากระบบ', danger: true })
    .then(function (ok) {
      if (!ok) return;
      var token = Store.token;
      Store.token = null; Store.user = null; Store.caps = [];
      try { localStorage.removeItem('lms.token'); } catch (e) {}

  function highlightKpisHtml(stats, warn) {
    // แสดงครบ 3 ประเภทหลัก (ลาป่วย ลากิจ ลาพักร้อน) แถวเดียวกัน
    var ORDER = ['sick', 'personal', 'annual'];
    var types = activeLeaveTypes();
    // ถ้า types ไม่ครบ ORDER ให้ใช้ types จาก activeLeaveTypes แทน (fallback)
    var show = ORDER.filter(function(k){ return types.indexOf(k) >= 0; });
    if (show.length === 0) show = types.slice(0, 3);
    function card(k) {
      var s = stats[k] || { used: 0, limit: 0, percent: 0, remaining: 0 };
      var pct = s.percent || 0;
      var tone = pct >= 100 ? 'rose' : (pct >= warn ? 'amber' : 'emerald');
      return '<div class="hl-card tone-' + tone + '">'
        + '<div class="hl-icon"><i class="bi bi-' + leaveTypeIcon(k) + '"></i></div>'
        + '<div class="hl-label">' + esc(LMS.LEAVE_TYPE_LABEL[k] || k) + '</div>'
        + '<div class="hl-value">' + s.remaining + '<span style="font-size:10px;color:#94a3b8;margin-left:2px">วัน</span></div>'
        + '<div class="hl-sub">จาก ' + s.limit + ' วัน</div>'
        + '</div>';
    }
    return '<div class="highlight-grid">' + show.map(card).join('') + '</div>';
  }

  function daysBetween(s, e) {
    if (!s || !e) return 0;
    var d1 = new Date(String(s).substring(0,10) + 'T00:00:00');
    var d2 = new Date(String(e).substring(0,10) + 'T00:00:00');
    if (isNaN(d1.getTime()) || isNaN(d2.getTime())) return 0;
    
    var holidays = (LMS.Store.boot && LMS.Store.boot.holidays) || {};
    var count = 0;
    var d = new Date(d1.getTime());
    while (d.getTime() <= d2.getTime()) {
      var y = d.getFullYear();
      var m = ('0' + (d.getMonth() + 1)).slice(-2);
      var day = ('0' + d.getDate()).slice(-2);
      var dateStr = y + '-' + m + '-' + day;
      
      var isHoliday = (dateStr in holidays);
      if (!isHoliday) {
        count++;
      }
      d.setDate(d.getDate() + 1);
    }
    return count;
  }
  function round2(n) {
    return Math.round(Number(n || 0) * 100) / 100;
  }
  function timeMinutes(t) {
    var m = String(t || '').match(/^(\d{1,2}):(\d{2})$/);
    if (!m) return null;
    return Number(m[1]) * 60 + Number(m[2]);
  }
  function leaveDuration(d) {
    if (d.leave_unit === 'hour') {
      var sm = timeMinutes(d.start_time), em = timeMinutes(d.end_time);
      var hours = (sm == null || em == null || em <= sm) ? 0 : round2((em - sm) / 60);
      var days = round2(hours / 8);
      return { hours: hours, days: days, label: hours + ' ชั่วโมง (' + days + ' วัน)' };
    }
    var days = daysBetween(d.start_date, d.end_date);
    return { hours: days * 8, days: days, label: days + ' วัน' };
  }
  function captureWiz() {

  function validateStep(n) {
    var d = WIZ.data;
    var err = {};
    if (n === 1) {
      if (!d.leave_type) err.leave_type = 'กรุณาเลือกประเภทการลา';
      if (!d.reason || d.reason.trim().length < 3) err.reason = 'กรุณาระบุเหตุผลอย่างน้อย 3 ตัวอักษร';
    } else if (n === 2) {
      if (!d.start_date) err.start_date = 'ระบุวันเริ่ม';
      if (!d.end_date) err.end_date = 'ระบุวันสิ้นสุด';
      if (d.start_date && d.end_date && new Date(d.end_date) < new Date(d.start_date)) err.end_date = 'วันสิ้นสุดต้องไม่ก่อนวันเริ่ม';
      if (d.leave_unit === 'hour') {
        if (d.end_date !== d.start_date) err.end_date = 'ลาเป็นชั่วโมงต้องอยู่ภายในวันเดียวกัน';
        if (!d.start_time) err.start_time = 'ระบุเวลาเริ่มลา';
        if (!d.end_time) err.end_time = 'ระบุเวลาสิ้นสุด';
        var sm = timeMinutes(d.start_time), em = timeMinutes(d.end_time);
        if (sm != null && sm < WORK_START_MINUTES) err.start_time = 'เวลาเริ่มลาต้องไม่ก่อน 08:30 น.';
        if (em != null && em > WORK_END_MINUTES) err.end_time = 'เวลาสิ้นสุดต้องไม่เกิน 20:00 น.';
        var dur = leaveDuration(d);
        if (d.start_time && d.end_time && dur.hours < 1) err.end_time = 'ต้องลาอย่างน้อย 1 ชั่วโมง';
      }

  function showStepErrors(errors) {
    $$('#wiz-pane .field').forEach(function (f) { f.classList.remove('has-error'); });

    Object.keys(errors).forEach(function (key) {

      if (!input) return;
      var f = input.closest('.field');

      var err = document.createElement('div');
      err.className = 'field-error';

      if (hint) f.insertBefore(err, hint); else f.appendChild(err);

    var pane = $('#wiz-pane');
    if (pane) { pane.classList.add('is-shake'); setTimeout(function () { pane.classList.remove('is-shake'); }, 500); }
    var firstKey = Object.keys(errors)[0];

    if (firstInput) try { firstInput.focus(); } catch (e) {}

  function wireWizard() {
    // step jumps
    $$('.wiz-step').forEach(function (s) {
      s.addEventListener('click', function () {
        var n = Number(s.getAttribute('data-jump'));
        if (n < WIZ.step) { captureWiz(); WIZ.step = n; renderWizard(); }
        else if (n === WIZ.step) return;
        else {
          captureWiz();
          var err = validateStep(WIZ.step);
          if (Object.keys(err).length) { showStepErrors(err); return; }
          WIZ.step = n; renderWizard();
        }
      });
    });
    var prev = $('#wiz-prev'); if (prev) prev.addEventListener('click', function () { captureWiz(); WIZ.step--; renderWizard(); });
    var next = $('#wiz-next'); if (next) next.addEventListener('click', function () {

      }
      $$('#wiz-pane [data-field]').forEach(function (el) { el.addEventListener('input', updatePreview); el.addEventListener('change', updatePreview); });
      updatePreview();
    }
    // step 4 — fetch preview (limit warn)
    if (WIZ.step === 4) {

            + '(จะเหลือ ' + pv.after_remaining + ' วัน)</div>';
        } else if (pv.warn) {

  function _approvalStages_() {
    var s = (LMS.Store.boot && LMS.Store.boot.settings && LMS.Store.boot.settings.approval_stages) || '3';
    var n = Number(s);
    return (n === 1 || n === 2 || n === 3) ? n : 3;
  }
  function renderWorkflow(lv) {
    var stages = _approvalStages_();
    var allSteps = {
      submit:  { title: 'ผู้ลายื่นใบลา', icon: 'send-fill', user: lv.requester ? lv.requester.full_name : '', at: lv.created_at, comment: '' },
      check:   { title: 'เจ้าหน้าที่ตรวจสอบ', icon: 'shield-check', user: lv.checker ? lv.checker.full_name : '', at: lv.checker_at, comment: lv.checker_comment },
      comment: { title: 'ความเห็นผู้บังคับบัญชา', icon: 'briefcase-fill', user: lv.supervisor ? lv.supervisor.full_name : '', at: lv.supervisor_at, comment: lv.supervisor_comment },
      approve: { title: 'ฝ่ายบุคคล', icon: 'mortarboard-fill', user: lv.approver ? lv.approver.full_name : '', at: lv.approver_at, comment: lv.approver_comment }
    };
    // เลือก steps ที่ใช้ตาม stages — แต่ถ้า lv มี checker/supervisor data ค้างอยู่ (จาก stages เก่า) → แสดงด้วย
    var stepKeys = ['submit'];
    if (stages >= 3 || lv.checker_id) stepKeys.push('check');
    if (stages >= 2 || lv.supervisor_id) stepKeys.push('comment');
    stepKeys.push('approve');
    // flow order — ใช้ตรวจ done/active ตาม stages
    var statusOrder;
    if (stages === 1) statusOrder = ['pending', 'approved'];
    else if (stages === 2) statusOrder = ['pending', 'reviewed', 'approved'];
    else statusOrder = ['pending', 'checked', 'reviewed', 'approved'];
    var currentIdx = statusOrder.indexOf(lv.status);
    return '<div class="wf-timeline">' + stepKeys.map(function (key) {
      var s = allSteps[key];
      var done = false, active = false, rejected = false;
      if (key === 'submit') done = true;
      else if (key === 'check') {
        done = !!lv.checker_id;
        active = (lv.status === 'pending' && stages >= 3 && !lv.checker_id);
      } else if (key === 'comment') {
        done = !!lv.supervisor_id;
        active = ((lv.status === 'checked' || (stages === 2 && lv.status === 'pending')) && !lv.supervisor_id);
      } else if (key === 'approve') {
        done = lv.status === 'approved';
        rejected = lv.status === 'rejected';
        active = (lv.status === 'reviewed' || (stages === 1 && lv.status === 'pending'));
      }
      var cls = done ? 'is-done' : (active ? 'is-active' : (rejected ? 'is-rejected' : ''));
      var icon = rejected ? 'x-lg' : (done ? 'check-lg' : s.icon);
      return '<div class="wf-step ' + cls + '">'
        + '<div class="wf-step-icon"><i class="bi bi-' + icon + '"></i></div>'
        + '<div class="wf-step-body">'
        + '<div class="wf-step-title">' + esc(s.title) + (s.user ? ' · ' + esc(s.user) : '') + '</div>'
        + (s.at ? '<div class="wf-step-meta"><i class="bi bi-clock"></i> ' + TH.dateTime(s.at) + '</div>' : '')
        + (s.comment ? '<div class="wf-step-comment">' + esc(s.comment) + '</div>' : '')
        + '</div></div>';
    }).join('') + '</div>';
  }
  function renderActions(lv, isMine) {
    var actions = [];
    var stages = _approvalStages_();
    if (isMine && (lv.status === 'draft' || lv.status === 'pending')) {
      actions.push('<button class="btn btn-warning" data-act="cancel"><i class="bi bi-x-circle-fill"></i> ยกเลิกใบลา</button>');
    }
    // Check action — ใช้ได้เฉพาะ stages = 3 + สถานะ pending
    if (stages >= 3 && lv.status === 'pending' && hasCap('leave.check')) {
      actions.push('<button class="btn btn-primary" data-act="check"><i class="bi bi-shield-check"></i> ตรวจสอบ</button>');
    }
    // Comment (supervisor) — stages >= 2, สถานะ checked (stages=3) หรือ pending (stages=2)
    if (stages >= 2 && hasCap('leave.comment')) {
      var canComment = (lv.status === 'checked') || (stages === 2 && lv.status === 'pending');
      if (canComment) {
        actions.push('<button class="btn btn-primary" data-act="comment"><i class="bi bi-chat-text-fill"></i> ให้ความเห็น</button>');
      }
    }
    // Approve — ขั้นสุดท้ายเสมอ
    if (hasCap('leave.approve')) {
      var canApprove = false;
      if (stages === 1) canApprove = (lv.status === 'pending');
      else if (stages === 2) canApprove = (lv.status === 'reviewed' || lv.status === 'pending' || lv.status === 'checked');
      else canApprove = (lv.status === 'reviewed' || lv.status === 'checked');
      if (canApprove) {
        actions.push('<button class="btn btn-success" data-act="approve"><i class="bi bi-check-circle-fill"></i> อนุมัติ</button>');
        actions.push('<button class="btn btn-danger" data-act="reject"><i class="bi bi-x-circle-fill"></i> ไม่อนุมัติ</button>');
      }
    }
    if (hasCap('leave.delete')) {
      actions.push('<button class="btn btn-ghost" data-act="delete" style="color:#dc2626"><i class="bi bi-trash-fill"></i> ลบ</button>');
    }
    actions.push('<a href="#/leaves/print?id=' + esc(lv.id) + '" class="btn btn-ghost"><i class="bi bi-printer-fill"></i> พิมพ์</a>');
    if (actions.length === 0) return '<div style="color:#94a3b8;font-size:13px">ยังไม่มีการดำเนินการที่คุณทำได้</div>';
    return '<div style="display:flex;flex-wrap:wrap;gap:8px">' + actions.join('') + '</div>';
  }

        var act = b.getAttribute('data-act');
        if (act === 'cancel') {

              call('leave.cancel', { id: lv.id }).then(function () { Spinner.hide(); toast('ยกเลิกแล้ว', 'success'); LMS.dispatch(); }).catch(function (e) { Spinner.hide(); alertError('ผิดพลาด', e.message); });
            });
        } else if (act === 'check') {
          openCommentModal('ตรวจสอบใบลา', 'ความเห็นการตรวจสอบ (ถ้ามี)', function (comment) {
            Spinner.show('กำลังบันทึก...');
            call('leave.check', { id: lv.id, comment: comment }).then(function () { Spinner.hide(); Modal.close(); alertSuccess('สำเร็จ', 'ส่งใบลาให้ผู้บังคับบัญชาแล้ว'); LMS.dispatch(); }).catch(function (e) { Spinner.hide(); alertError('ผิดพลาด', e.message); });
          });
        } else if (act === 'comment') {
          openCommentModal('ความเห็นผู้บังคับบัญชา', 'กรอกความเห็นเพื่อส่งต่อให้ผู้อนุมัติ', function (comment) {
            Spinner.show('กำลังบันทึก...');
            call('leave.comment', { id: lv.id, comment: comment }).then(function () { Spinner.hide(); Modal.close(); alertSuccess('สำเร็จ', 'ส่งความเห็นให้ผู้อนุมัติแล้ว'); LMS.dispatch(); }).catch(function (e) { Spinner.hide(); alertError('ผิดพลาด', e.message); });
          }, true);
        } else if (act === 'approve') {
          openCommentModal('อนุมัติใบลา', 'หมายเหตุ (ถ้ามี)', function (comment) {
            Spinner.show('กำลังอนุมัติ...');
            call('leave.approve', { id: lv.id, decision: 'approved', comment: comment }).then(function () { Spinner.hide(); Modal.close(); Swal.fire({ icon: 'success', title: 'อนุมัติแล้ว!', timer: 2000, showConfirmButton: false, timerProgressBar: true }); LMS.dispatch(); }).catch(function (e) { Spinner.hide(); alertError('ผิดพลาด', e.message); });
          });
        } else if (act === 'reject') {
          openCommentModal('ไม่อนุมัติใบลา', 'เหตุผลที่ไม่อนุมัติ (กรุณาระบุ)', function (comment) {
            if (!comment.trim()) { toast('กรุณาระบุเหตุผล', 'warning'); return; }
            Spinner.show('กำลังบันทึก...');
            call('leave.approve', { id: lv.id, decision: 'rejected', comment: comment }).then(function () { Spinner.hide(); Modal.close(); toast('บันทึกการไม่อนุมัติแล้ว', 'warning'); LMS.dispatch(); }).catch(function (e) { Spinner.hide(); alertError('ผิดพลาด', e.message); });
          }, true);
        } else if (act === 'delete') {
          confirmModal({ title: 'ลบใบลานี้?', message: 'การลบไม่สามารถย้อนกลับได้', okText: 'ลบ', danger: true })

    function doRender() {
      var ws = TH.splitDate(lv.written_at);

      }

      var supervisorName = lv.supervisor ? lv.supervisor.full_name : '';

      var supervisorAt   = lv.supervisor_at ? TH.splitDate(lv.supervisor_at) : null;
      var supervisorComment = lv.supervisor_comment || '';
      var checkerName = lv.checker ? lv.checker.full_name : '';
      var checkerPos  = lv.checker ? lv.checker.position : '';
      var checkerAt   = lv.checker_at ? TH.splitDate(lv.checker_at) : null;

      var approverPos  = lv.approver ? lv.approver.position : '';

        }

        var reader = new FileReader();
        reader.onload = function (e) {
          var img = new Image();
          img.onload = function () {
            var canvas = document.createElement('canvas');
            var size = 300;
            canvas.width = size;
            canvas.height = size;
            var ctx = canvas.getContext('2d');

            var w = img.width;
            var h = img.height;
            var sx = 0, sy = 0, sSize = 0;
            if (w > h) {
              sSize = h;
              sx = (w - h) / 2;
            } else {
              sSize = w;
              sy = (h - w) / 2;
            }
            ctx.drawImage(img, sx, sy, sSize, sSize, 0, 0, size, size);

            var max_bytes = 64000;
            var quality = 0.7;
            var dataUrl = '';
            var attempt = 0;
            while (attempt < 5) {
              try {
                dataUrl = canvas.toDataURL('image/jpeg', quality);
              } catch (err) {
                dataUrl = e.target.result;
                break;
              }
              if (dataUrl.length <= max_bytes) break;
              quality = Math.max(0.2, quality - 0.1);
              attempt++;
            }

            chosenAvatarBase64 = dataUrl;
            if (previewContainer) {
              previewContainer.innerHTML = '<img src="' + esc(dataUrl) + '" style="width:100%;height:100%;object-fit:cover" id="pf-avatar-img">';

      var qId = crypto.randomUUID();
      var q = qData || { question: '', options: ['', '', '', ''], correct_option: 0 };
      q.id = qId;
      questions.push(q);
      renderQuestions();
    };

    window.deleteQuestion = function (qId) {
      questions = questions.filter(function (x) { return x.id !== qId; });
      renderQuestions();
    };

    window.generateQuizWithAI = function () {
      call('setting.get', {}).then(function (s) {
        var apiKey = String(s.google_gemini_api_key || '').trim();
        if (!apiKey) {
          alertError('ไม่พบ API Key', 'กรุณาระบุ Gemini API Key ในหน้าตั้งค่าระบบก่อนใช้งานระบบออกข้อสอบด้วย AI');
          return;
        }

        var title = $('#c-title').value.trim();
        var content = $('#c-content').value.trim();
        if (!title || !content) {
          toast('กรุณากรอกชื่อคอร์สและเนื้อหาบทเรียนอย่างละเอียด เพื่อให้ AI วิเคราะห์ก่อนออกข้อสอบ', 'warning');
          return;
        }

        Spinner.show('AI กำลังวิเคราะห์เนื้อหาและออกข้อสอบสไตล์วิเคราะห์สินค้า...');
        var prompt = "คุณคือผู้เชี่ยวชาญการออกข้อสอบสำหรับการเรียนรู้อบรมพนักงานสาขาหน้าร้าน\n"
          + "จงออกข้อสอบปรนัย 4 ตัวเลือก จำนวน 5 ข้อ จากเนื้อหาต่อไปนี้:\n"
          + "ชื่อคอร์ส: " + title + "\n"
          + "เนื้อหา: " + content + "\n\n"
          + "กติกา:\n"
          + "1. ออกข้อสอบ 5 ข้อ แต่ละข้อมี 4 ตัวเลือก\n"
          + "2. กำหนด correct_option เป็นดัชนีของตัวเลือกที่ถูกต้อง (0, 1, 2, หรือ 3)\n"
          + "3. ส่งผลลัพธ์กลับมาเป็น JSON Array รูปแบบนี้เท่านั้น ห้ามใส่ markdown block (เช่น ```json) หรือข้อความอธิบายใดๆ ทั้งก่อนและหลัง JSON โดยเด็ดขาด:\n"
          + "[\n"
          + "  {\n"
          + "    \"question\": \"คำถาม...\",\n"
          + "    \"options\": [\"ตัวเลือก 0\", \"ตัวเลือก 1\", \"ตัวเลือก 2\", \"ตัวเลือก 3\"],\n"
          + "    \"correct_option\": 0\n"
          + "  }\n"
          + "]";

        var models = [
          "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey,
          "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + apiKey,
          "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=" + apiKey
        ];
        
        function tryFetch(index) {
          if (index >= models.length) {
            Spinner.hide();
            alertError('ผิดพลาด', 'ไม่สามารถเชื่อมต่อกับ Gemini API ได้ หรือโควต้าของคีย์คุณหมดแล้ว กรุณาตรวจสอบการตั้งค่าคีย์ของคุณ');
            return;
          }
          
          var targetUrl = models[index];
          var payload = {
            contents: [{ parts: [{ text: prompt }] }]
          };
          
          if (targetUrl.indexOf('v1beta') >= 0) {
            payload.generationConfig = { response_mime_type: "application/json" };
          } else {
            payload.generationConfig = { responseMimeType: "application/json" };
          }
          
          fetch(targetUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          })
          .then(function (res) {
            if (!res.ok) {
              return res.json().then(function (errJson) {
                var msg = errJson && errJson.error && errJson.error.message ? errJson.error.message : ('Status ' + res.status);
                return Promise.reject(new Error(msg));
              }).catch(function () {
                return Promise.reject(new Error('Status ' + res.status));
              });
            }
            return res.json();
          })
          .then(function (json) {
            if (!json) return;
            Spinner.hide();
            if (!json.candidates || !json.candidates[0] || !json.candidates[0].content || !json.candidates[0].content.parts[0].text) {
              throw new Error('ไม่ได้รับข้อมูลตอบกลับที่ถูกต้องจาก AI');
            }
            var text = json.candidates[0].content.parts[0].text.trim();
            if (text.indexOf('```') === 0) {
              text = text.replace(/^```(?:json)?\s*|```\s*$/g, '').trim();
            }
            var qList = JSON.parse(text);
            if (!Array.isArray(qList)) throw new Error('รูปแบบข้อมูลจาก AI ไม่ถูกต้อง');
            
            questions = [];
            qList.forEach(function (q) {
              addQuestion({
                question: q.question,
                options: q.options,
                correct_option: q.correct_option
              });
            });
            toast('AI ออกข้อสอบเสร็จสิ้นจำนวน ' + qList.length + ' ข้อ', 'success');
          })
          .catch(function (err) {
            console.warn('Gemini API call failed for ' + targetUrl + ':', err.message);
            tryFetch(index + 1);
          });
        }
        
        tryFetch(0);
      }).catch(function (e) {
        alertError('ผิดพลาด', 'โหลดการตั้งค่าไม่สำเร็จ: ' + e.message);
      });
    };

    function renderQuestions() {

          + '    <select class="select" style="max-width:180px;padding:4px 8px;font-size:13px" id="q-' + q.id + '-correct">'
          + '      <option value="0" ' + (Number(q.correct_option) === 0 ? 'selected' : '') + '>ตัวเลือกที่ 1</option>'
          + '      <option value="1" ' + (Number(q.correct_option) === 1 ? 'selected' : '') + '>ตัวเลือกที่ 2</option>'
          + '      <option value="2" ' + (Number(q.correct_option) === 2 ? 'selected' : '') + '>ตัวเลือกที่ 3</option>'
          + '      <option value="3" ' + (Number(q.correct_option) === 3 ? 'selected' : '') + '>ตัวเลือกที่ 4</option>'
          + '    </select>'
          + '  </div>'
          + '</div>';
      }).join('');
    }

    if (isEdit) {
      Spinner.show('กำลังโหลดข้อมูลคอร์สเรียน...');
      Promise.all([
        call('course.get', { id: id }),

        Spinner.hide();
        var c = res[0].course || {};

        $('#c-thumb').value = c.thumbnail_url || '';

        $('#c-status').value = c.status || 'active';
        $('#c-content').value = c.content || '';

        questions = [];
        qList.forEach(function (q) {
          addQuestion({
            question: q.question,
            options: q.options,
            correct_option: q.correct_option
          });
        });
      }).catch(function (e) {
        Spinner.hide();
        alertError('ผิดพลาด', e.message);
        location.hash = '#/courses';
      });
    } else {

    window.saveCourse = function () {
      var title = $('#c-title').value.trim();
      var content = $('#c-content').value.trim();
      if (!title) { toast('กรุณาระบุชื่อคอร์สเรียน', 'warning'); return; }
      if (!content) { toast('กรุณาระบุเนื้อหาบทเรียน', 'warning'); return; }

      var updatedQuestions = [];
      for (var i = 0; i < questions.length; i++) {
        var oldQ = questions[i];
        var qTitle = $('#q-' + oldQ.id + '-title').value.trim();
        if (!qTitle) { toast('กรุณากรอกคำถามข้อที่ ' + (i + 1), 'warning'); return; }
        
        var opts = [];
        for (var j = 0; j < 4; j++) {
          var optVal = $('#q-' + oldQ.id + '-opt-' + j).value.trim();
          if (!optVal) { toast('กรุณากรอกตัวเลือกที่ ' + (j + 1) + ' ของคำถามข้อที่ ' + (i + 1), 'warning'); return; }
          opts.push(optVal);
        }

        var correctOpt = Number($('#q-' + oldQ.id + '-correct').value);

        updatedQuestions.push({
          question: qTitle,
          options: opts,
          correct_option: correctOpt
        });
      }

      var payload = {
        title: title,
        description: $('#c-desc').value.trim(),
        thumbnail_url: $('#c-thumb').value.trim(),
        content: content,
        video_url: $('#c-video').value.trim(),
        status: $('#c-status').value,
        questions: updatedQuestions
      };

      var apiAction = isEdit ? 'course.update' : 'course.create';
      if (isEdit) payload.id = id;

      Spinner.show('กำลังบันทึก...');
      call(apiAction, payload).then(function () {
        Spinner.hide();
        toast('บันทึกคอร์สเรียนสำเร็จแล้ว', 'success');
        location.hash = '#/courses';
      }).catch(function (e) {
        Spinner.hide();
        alertError('ผิดพลาด', e.message);
      });
    };

    function load() {
      var listDiv = $('#org-chart-list');
      if (!listDiv) return;
      listDiv.innerHTML = skBlocks(4, 80);
      call('user.branch_directory', {}).then(function (r) {
        var items = r.items || [];
        var filtered = items.filter(function (u) {
          if (st.q) {
            var search = st.q.toLowerCase();
            var nameOk = (u.full_name || '').toLowerCase().indexOf(search) >= 0;
            var posOk = (u.position || '').toLowerCase().indexOf(search) >= 0;
            var deptOk = (u.department || '').toLowerCase().indexOf(search) >= 0;
            if (!nameOk && !posOk && !deptOk) return false;
          }
          if (st.department && u.department !== st.department) return false;
          return true;
        });

        // Group by Department
        var deptsMap = {};
        DEPARTMENTS.forEach(function (d) { deptsMap[d] = []; });
        deptsMap['ไม่ระบุแผนก'] = [];

        filtered.forEach(function (u) {
          var d = u.department || 'ไม่ระบุแผนก';
          if (!deptsMap[d]) deptsMap[d] = [];
          deptsMap[d].push(u);
        });

        var html = '';

        Object.keys(deptsMap).forEach(function (dName) {
          var uList = deptsMap[dName] || [];
          if (st.department && dName !== st.department) return;
          if (uList.length === 0) return;

          // Separate leaders and staff
          var leaders = [];
          var staff = [];

          uList.forEach(function (u) {
            var isLeader = u.role === 'supervisor' || u.role === 'admin' || u.role === 'approver'
              || (u.position || '').indexOf('หัวหน้า') >= 0
              || (u.position || '').indexOf('ผู้จัดการ') >= 0
              || (u.position || '').toLowerCase().indexOf('head') >= 0
              || (u.position || '').toLowerCase().indexOf('manager') >= 0;
            if (isLeader) {
              leaders.push(u);
            } else {
              staff.push(u);
            }
          });

          // Sort leaders by role priority (admin/approver first, then supervisor)
          leaders.sort(function (a, b) {
            var getPriority = function (u) {
              if (u.role === 'admin') return 1;
              if (u.role === 'approver') return 2;
              if (u.role === 'supervisor') return 3;
              return 4;
            };
            return getPriority(a) - getPriority(b);
          });

          function renderCard(u, isLeader) {
            var initial = (u.full_name || '?').substring(0, 1).toUpperCase();

            + '</div>';

            curYear--;

          monthSelect.value = curMonth;
          yearSelect.value = curYear;
          load(true); // load previous month, selecting last week

          weekSelect.value = curWeekIdx;
          renderTable();

        curMonth--;

          curMonth = 12;
          curYear--;
        }
        monthSelect.value = curMonth;
        yearSelect.value = curYear;
        load();
      }

          if (curMonth > 12) {

            curYear++;

              });

    function load(selectLastWeek) {
      var tableWrapper = $('#sched-table-wrapper');
      var statsWrapper = $('#sched-stats');
      if (!tableWrapper) return;
      
      tableWrapper.innerHTML = '<div style="padding: 40px; text-align: center;">' + skBlocks(3, 70) + '</div>';
      statsWrapper.innerHTML = '';
      
      call('schedule.monthly', { year: curYear, month: curMonth }).then(function (res) {
        loadedData = res || { dates: [], quotas: {} };
        if (loadedData.dates.length === 0) {
          tableWrapper.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--ink-muted);">ไม่พบข้อมูลสำหรับช่วงเวลาดังกล่าว</div>';
          return;
        }
        
        var dates = loadedData.dates;
        var numWeeks = Math.ceil(dates.length / 7);
        
        if (selectLastWeek === true) {
          curWeekIdx = numWeeks - 1;
        } else if (selectLastWeek === false) {
          curWeekIdx = 0;
        } else {
          var tD = new Date();
          var todayDateStr = tD.getFullYear() + '-' + String(tD.getMonth()+1).padStart(2,'0') + '-' + String(tD.getDate()).padStart(2,'0');
          var todayIdx = -1;
          for (var i = 0; i < dates.length; i++) {
            if (dates[i].date === todayDateStr) {
              todayIdx = i;
              break;
            }
          }
          if (todayIdx !== -1) {
            curWeekIdx = Math.floor(todayIdx / 7);
          } else {
            curWeekIdx = 0;
          }
        }
        
        // Re-construct branchGroups based on loadedData
        var firstDay = loadedData.dates[0];
        branchGroups = {
          'ราชพฤกษ์': [],
          'ปอโต': [],
          'วิรันด้า': [],
          'พนักงานแทน': []
        };
        firstDay.branch_employees.forEach(function (emp) {
          if (branchGroups[emp.branch]) {
            branchGroups[emp.branch].push({
              id: emp.id,
              full_name: emp.full_name,
              position: emp.position,
              branch: emp.branch,
              off_day: emp.off_day,
              avatar: emp.avatar
            });
          }
        });
        firstDay.substitutes.forEach(function (sub) {
          if (branchGroups[sub.branch]) {
            branchGroups[sub.branch].push({
              id: sub.id,
              full_name: sub.full_name,
              position: sub.position,
              branch: sub.branch,
              off_day: sub.off_day,
              avatar: sub.avatar
            });
          }
        });

        updateWeekDropdown();
        renderStats();
        renderTable();
      }).catch(function (e) {
        tableWrapper.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--rose);">เกิดข้อผิดพลาดในการโหลดข้อมูล: ' + esc(e.message) + '</div>';
      });
    }

    load();
  };

  // ── Attendance Logs ─────────────────────────────────
  Routes['#/attendance'] = function () {
    if (!hasCap('user.manage|leave.approve|leave.comment')) { toast('ไม่มีสิทธิ์', 'warning'); location.hash = '#/dashboard'; return; }
    var st = { page: 1, user_id: '', branch: '', department: '', q: '' };
    
    Spinner.show('กำลังโหลดข้อมูล...');
    call('user.list', { per_page: 1000 }).then(function (userRes) {
      Spinner.hide();
      var users = userRes.items || [];
      
      setPage('<div class="toolbar">'
        + '<div class="search-box"><i class="bi bi-search"></i><input type="text" id="att-q" placeholder="ค้นหา ชื่อพนักงาน..."></div>'
        + '<select class="select" id="att-user" style="max-width:180px"><option value="">พนักงานทั้งหมด</option>'
        + users.map(function (u) { return '<option value="' + u.id + '">' + esc(u.full_name) + '</option>'; }).join('')
        + '</select>'
        + '<select class="select" id="att-branch" style="max-width:150px"><option value="">ทุกสาขา</option>'
        + BRANCHES.map(function (b) { return '<option value="' + b + '">' + esc(b) + '</option>'; }).join('')
        + '</select>'
        + '<select class="select" id="att-dept" style="max-width:150px"><option value="">ทุกแผนก</option>'
        + DEPARTMENTS.map(function (d) { return '<option value="' + d + '">' + esc(d) + '</option>'; }).join('')
        + '</select>'
        + '</div>'
        + '<div id="att-content">'
        + '  <div id="att-list">' + skBlocks(5, 50) + '</div>'
        + '  <div id="lv-pager" style="margin-top:14px"></div>'
        + '</div>');
        
      var allCheckins = [];
      
      function load() {
        Spinner.show('กำลังโหลดประวัติการเข้างาน...');
        call('checkin.list', { per_page: 1000 }).then(function (r) {
          Spinner.hide();
          allCheckins = r.items || [];
          render();
        }).catch(function (e) {
          Spinner.hide();
          alertError('ผิดพลาด', e.message);
        });
      }
      
      function render() {
        var filtered = allCheckins.filter(function (item) {
          if (st.user_id && item.user_id !== st.user_id) return false;
          if (st.branch) {
            var matchCheckIn = item.check_in_loc && item.check_in_loc.indexOf(st.branch) >= 0;
            var matchCheckOut = item.check_out_loc && item.check_out_loc.indexOf(st.branch) >= 0;
            if (!matchCheckIn && !matchCheckOut) return false;
          }
          if (st.department && item.department !== st.department) return false;
          if (st.q) {
            var qLower = st.q.toLowerCase();
            var nameLower = (item.full_name || '').toLowerCase();
            if (nameLower.indexOf(qLower) === -1) return false;
          }
          return true;
        });
        
        var total = filtered.length;
        var per = 15;
        var pages = Math.ceil(total / per) || 1;
        if (st.page > pages) st.page = pages;
        var pageItems = filtered.slice((st.page - 1) * per, st.page * per);
        
        var rows = pageItems.map(function (item) {
          var dateStr = TH.date(item.check_in_at);
          
          var checkInPhotoHtml = '-';
          if (item.check_in_img) {
            checkInPhotoHtml = '<button class="btn btn-sm btn-ghost btn-icon view-selfie-btn" data-img="' + esc(item.check_in_img) + '" data-name="' + esc(item.full_name) + '" data-type="เช็คอิน" data-time="' + esc(TH.time(item.check_in_at)) + '">'

  function _mkMonthKey(v) {
    if (!v) { var dn = new Date(); return dn.getFullYear() + '-' + ('0' + (dn.getMonth() + 1)).slice(-2); }
    var s = String(v).trim();
    if (/^\d{4}-\d{2}$/.test(s)) return s;
    var d = new Date(s);
    if (!isNaN(d.getTime())) return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2);
    var dn2 = new Date();
    return dn2.getFullYear() + '-' + ('0' + (dn2.getMonth() + 1)).slice(-2);
  }
  function _addMonthKey(v, delta) {
    var m = _mkMonthKey(v).split('-');
    var d = new Date(Number(m[0]), Number(m[1]) - 1 + delta, 1);
    return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2);
  }
  function _monthLabel(key) {
    var m = _mkMonthKey(key).split('-');
    var d = new Date(Number(m[0]), Number(m[1]) - 1, 1);
    return TH.MONTHS[d.getMonth()] + ' ' + TH.beYear(d);
  }
  function _toneClass(type) {
    return ({ sick: 'rose', personal: 'amber', annual: 'emerald', maternity: 'emerald' })[type] || 'indigo';

  Routes['#/missions/view'] = function (hash) {
    var id = (hash || location.hash).split('?id=')[1] || '';
    if (!id) { toast('ไม่พบรายการ', 'error'); location.hash = '#/missions'; return; }
    setPage(skBlocks(1, 180) + skBlocks(2, 100));
    Spinner.show('กำลังโหลดรายละเอียด...');
    call('mission.get', { id: id }).then(function (d) {
      Spinner.hide();
      renderMissionDetail(d);
    }).catch(function (e) { Spinner.hide(); alertError('ผิดพลาด', e.message); });
  };

    var heroPillIcon = isWfh ? 'bi-house-fill' : 'bi-signpost-2-fill';

      + '<div class="hero-kpi"><div class="hkpi"><div class="hkpi-label"><i class="bi ' + (isWfh ? 'bi-house' : 'bi-geo-alt-fill') + '"></i> ' + kpiLocationLabel + '</div><div class="hkpi-value" style="font-size:18px">' + kpiLocationValue + '</div></div>'

      + (isWfh ? '' : '<div class="hkpi"><div class="hkpi-label"><i class="bi bi-cash-coin"></i> ค่าใช้จ่ายสะสม</div><div class="hkpi-value" style="font-size:18px">฿' + Number(m.expense_total || 0).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '</div></div>') + '</div>'

      + '  <div style="flex:1;min-width:0">'

      + '    <div style="font-size:12px;color:#64748b">' + esc(req.position || '-') + ' · ' + esc(req.department || '-') + '</div>'
      + '    <span class="role-chip role-chip-' + esc(req.role) + '" style="margin-top:4px"><i class="bi bi-shield-check"></i> ' + esc((LMS.Store.boot.roles||{})[req.role]||req.role) + '</span>'
      + '  </div>'
      + '</div>'
      + '<div class="grid-2">'

      + detailField('สถานะ', '<span class="badge b-' + esc(m.status_tone) + '">' + esc(m.status_label) + '</span>')
      + detailField('การอนุมัติ / ความเห็น', esc(m.approver_comment || '-'))
      + (isWfh ? '' : detailField('งบประมาณที่อนุมัติ', m.approved_amount ? '฿' + Number(m.approved_amount).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '-'))
      + '</div>'
      + '<div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">'

          Spinner.show('กำลังอนุมัติ...');
          var payload = { id: m.id, decision: 'approved' };
          if (isWfh) {
            payload.comment = r.value || '';
          } else {
            payload.approved_amount = r.value || '';

          call('mission.approve', payload).then(function () { Spinner.hide(); toast('อนุมัติเรียบร้อยแล้ว', 'success'); refreshMission(); }).catch(function (e) { Spinner.hide(); alertError('ผิดพลาด', e.message); });

        });

    if ($('#mis-delete')) $('#mis-delete').addEventListener('click', function () {

      confirmModal({ title: 'ลบรายการ?', message: confirmMsg, okText: 'ลบ', danger: true }).then(function (ok) {

        Spinner.show('กำลังลบรายการ...');

    });

  // ── Standalone Expenses Page (#/expenses) ──────────────────

    function bindExpenseFileNote(evidenceNote) {
      var fi = document.getElementById('fe-file');
      var note = document.getElementById('fe-file-note');
      if (!fi) return;
      
      updateReceiptsPreview();
      
      if (note && chosenReceipts.length > 0) {
        note.innerHTML = '<span style="color:#64748b">มีรูปแนบอยู่แล้ว (' + chosenReceipts.length + '/4 รูป)</span>';
      }

      fi.addEventListener('change', function () {
        var files = fi.files;
        if (!files || files.length === 0) return;
        
        var currentCount = chosenReceipts.length;
        var toAdd = Math.min(files.length, 4 - currentCount);
        
        if (toAdd <= 0) {
          toast('แนบรูปได้สูงสุด 4 รูปเท่านั้น', 'warning');
          fi.value = '';
          return;
        }

        var loadedCount = 0;
        if (note) note.innerHTML = '<span style="color:#3b82f6"><span class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="width:12px;height:12px;margin-right:4px;"></span> กำลังประมวลผลรูปภาพ...</span>';

        for (var i = 0; i < toAdd; i++) {
          (function (file) {
            var reader = new FileReader();
            reader.onload = function (e) {
              var img = new Image();
              img.onload = function () {
                var max_size = 600;
                var quality = 0.5;
                var dataUrl = '';
                var attempt = 0;
                while (attempt < 5) {
                  var canvas = document.createElement('canvas');
                  var w = img.width;
                  var h = img.height;
                  if (w > h) {
                    if (w > max_size) { h *= max_size / w; w = max_size; }
                  } else {
                    if (h > max_size) { w *= max_size / h; h = max_size; }
                  }
                  canvas.width = w; canvas.height = h;
                  var ctx = canvas.getContext('2d');
                  ctx.drawImage(img, 0, 0, w, h);
                  try {
                    dataUrl = canvas.toDataURL('image/jpeg', quality);
                  } catch (err) {
                    dataUrl = e.target.result;
                    break;
                  }
                  if (dataUrl.length <= 48000) break;
                  max_size = Math.round(max_size * 0.8);
                  quality = Math.max(0.2, quality - 0.1);
                  attempt++;
                }
                
                chosenReceipts.push(dataUrl || e.target.result);
                loadedCount++;
                if (loadedCount === toAdd) {
                  updateReceiptsPreview();
                  if (note) note.innerHTML = '<span style="color:#10b981"><i class="bi bi-check-circle-fill"></i> อัปโหลดรูปภาพสำเร็จ (' + chosenReceipts.length + '/4 รูป)</span>';
                  fi.value = '';
                }
              };
              img.onerror = function () {
                chosenReceipts.push(e.target.result);
                loadedCount++;
                if (loadedCount === toAdd) {
                  updateReceiptsPreview();
                  if (note) note.innerHTML = '<span style="color:#10b981"><i class="bi bi-check-circle-fill"></i> อัปโหลดรูปภาพสำเร็จ (' + chosenReceipts.length + '/4 รูป)</span>';
                  fi.value = '';
                }
              };
              img.src = e.target.result;
            };
            reader.readAsDataURL(file);
          })(files[i]);
        }
      });
    }

    function collectExpensePayload(preset) {
      preset = preset || {};
      var comp = document.getElementById('fe-company') ? document.getElementById('fe-company').value.trim() : '';
      var missionId = document.getElementById('fe-mission') ? document.getElementById('fe-mission').value : '';
      var receipts = chosenReceipts.length > 0 ? JSON.stringify(chosenReceipts) : '';
      var bankAccount = document.getElementById('fe-bank-account') ? document.getElementById('fe-bank-account').value.trim() : '';

      if (!comp) return Promise.reject(new Error('กรุณาเลือกบริษัทที่ต้องการเบิก'));

      /* multi-item mode — merge into one expense */
      var rows = document.querySelectorAll('#ef-items-list .ef-item-row');
      if (rows && rows.length > 0) {
        var totalAmt = 0;
        var descParts = [];
        var firstDate = '';
        var firstType = '';
        var err = null;
        rows.forEach(function(row, i) {
          var type = row.querySelector('.ef-item-type') ? row.querySelector('.ef-item-type').value : '';
          var desc = row.querySelector('.ef-item-desc') ? row.querySelector('.ef-item-desc').value.trim() : '';
          var amt  = parseFloat(row.querySelector('.ef-item-amt') ? row.querySelector('.ef-item-amt').value : '');
          var date = row.querySelector('.ef-item-date') ? row.querySelector('.ef-item-date').value : '';
          if (!desc) { err = 'รายการที่ ' + (i+1) + ': กรุณาระบุรายละเอียด'; return; }
          if (isNaN(amt) || amt <= 0) { err = 'รายการที่ ' + (i+1) + ': กรุณาระบุจำนวนเงินที่มากกว่า 0'; return; }
          if (!date) { err = 'รายการที่ ' + (i+1) + ': กรุณาระบุวันที่ใช้จ่าย'; return; }
          totalAmt += amt;
          descParts.push((i+1) + '. [' + type + '] ' + desc + ' (฿' + amt.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ')');
          if (!firstDate || date < firstDate) firstDate = date;
          if (!firstType) firstType = type;
        });
        if (err) return Promise.reject(new Error(err));
        var combinedDesc = '[' + comp + '] ' + descParts.join(' | ');
        return Promise.resolve({
          id: preset.id || '',
          expense_type: firstType || 'อื่น ๆ',
          description: combinedDesc,
          amount: totalAmt,
          expense_date: firstDate,
          mission_id: missionId,
          receipt_url: receipts,
          bank_account: bankAccount
        });
      }

      /* legacy single-item (modal) */
      var amt = parseFloat(document.getElementById('fe-amt') ? document.getElementById('fe-amt').value : '');
      var desc = document.getElementById('fe-desc') ? document.getElementById('fe-desc').value.trim() : '';
      var date = document.getElementById('fe-date') ? document.getElementById('fe-date').value : '';
      if (!desc) return Promise.reject(new Error('กรุณาระบุรายละเอียด/หัวข้อ'));
      if (isNaN(amt) || amt <= 0) return Promise.reject(new Error('กรุณาระบุจำนวนเงินที่มากกว่า 0'));
      if (!date) return Promise.reject(new Error('กรุณาระบุวันที่ใช้จ่าย'));
      return Promise.resolve({
        id: preset.id || '',
        expense_type: document.getElementById('fe-type') ? document.getElementById('fe-type').value : '',
        description: '[' + comp + '] ' + desc,
        amount: amt,
        expense_date: date,
        mission_id: missionId,
        receipt_url: receipts,
        bank_account: bankAccount
      });
    }

    function parseExpenseItems(descriptionText, presetDate, presetAmount, presetType) {
      var items = [];
      var descText = descriptionText || '';
      var match = descText.match(/^\[([^\]]+)\]\s*(.*)$/);
      if (match) {
        descText = match[2];
      }
      
      if (descText.match(/^\d+\.\s*\[/)) {
        var parts = descText.split(/\s*\|\s*\d+\.\s*\[/);
        parts.forEach(function (part, i) {
          if (i === 0) {
            part = part.replace(/^\d+\.\s*\[/, '');
          }
          var typeMatch = part.match(/^([^\]]+)\]\s*(.*)$/);
          if (typeMatch) {
            var type = typeMatch[1];
            var rest = typeMatch[2];
            
            var amtMatch = rest.match(/^(.*)\s*\(฿([^\)]+)\)$/);
            var desc = rest;
            var amount = presetAmount;
            if (amtMatch) {
              desc = amtMatch[1].trim();
              amount = parseFloat(amtMatch[2].replace(/,/g, ''));
            }
            items.push({
              type: type,
              desc: desc,
              date: presetDate,
              amount: amount
            });
          }
        });
      } else {
        items.push({
          type: presetType || 'อื่น ๆ',
          desc: descText,
          date: presetDate,
          amount: presetAmount
        });
      }
      return items;
    }

      function recalcTotal() {

        bankToggle.style.borderColor = '#fca5a5';

        bankInputWrap.style.display = 'block';

        bankToggle.style.color = '#475569';
        bankInputWrap.style.display = 'none';

          bankInputWrap.style.display = 'block';

          bankToggle.style.borderColor = '#fca5a5';
          bankToggle.style.color = '#ef4444';

    function openExpenseForm(preloadMissionId, isEditFlow, existingData) {
      Spinner.show('กำลังโหลดข้อมูลฟอร์ม...');
      call('mission.list', {}).then(function (res) {
        Spinner.hide();
        var missions = res.items || [];
        var preset = existingData || {};
        var missionOpts = expenseMissionOptions(missions, preloadMissionId || preset.mission_id);
        var typeOpts = expenseTypeOptions(preset.expense_type);
        
        var isEdit = !!preset.id;
        var modalTitle = isEdit ? 'แก้ไขใบเบิกค่าใช้จ่าย' : 'ยื่นใบเบิกค่าใช้จ่าย';
        var evidenceNote = preset.receipt_url ? 'มีหลักฐานแนบอยู่แล้ว (เลือกไฟล์ใหม่หากต้องการเปลี่ยน)' : 'แนบรูปภาพหลักฐานการจ่ายเงิน';
        
        var html = expenseFormHtml(typeOpts, missionOpts, preset);
          
        Swal.fire({
          title: modalTitle,
          html: html,
          width: '760px',
          customClass: { popup: 'expense-form-popup' },
          showCancelButton: true,
          showDenyButton: !isEdit || preset.status === 'draft',
          confirmButtonText: isEdit ? 'บันทึก' : 'ส่งคำขอเบิก',
          denyButtonText: 'บันทึกแบบร่าง',
          cancelButtonText: 'ยกเลิก',
          focusConfirm: false,
          didOpen: function () {
            bindExpenseFileNote(evidenceNote);
            var items = parseExpenseItems(preset.description, preset.expense_date, preset.amount, preset.expense_type);
            bindExpenseItems(items);
            bindExpenseBank(preset.bank_account);
          },
          preConfirm: function () {
            return collectExpensePayload(preset).catch(function (err) {
              Swal.showValidationMessage(err.message);
              return false;
            });
          }
        }).then(function (result) {
          if (result.isDismissed) return;
          
          var payload = result.value;
          if (result.isDenied) {
            payload.draft = true;
          }
          
          saveExpense(payload, isEdit, function () {
            if (params.edit) {
              location.hash = '#/expenses/view?id=' + preset.id;
            } else {
              load();
            }
          });
        });
      }).catch(function (e) {
        Spinner.hide();
        alertError('ผิดพลาด', e.message);
      });
    }
    
    var addBtn = $('#exp-add');
    if (addBtn) {
      addBtn.addEventListener('click', function () {
        location.hash = '#/expenses/new';
      });
    }
    
    if (params.edit) {
      Spinner.show('กำลังโหลดข้อมูลใบเบิก...');
      call('expense.get', { id: params.edit }).then(function (r) {

        openExpenseForm('', true, r.expense);
      }).catch(function (e) {
        Spinner.hide();
        alertError('ผิดพลาด', e.message);
      });
    }
    
    load();
  };
