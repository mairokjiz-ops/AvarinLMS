<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Avarin LMS LIFF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --bg: #bcebf7;
      --surface: rgba(255, 255, 255, .72);
      --surface-2: rgba(238, 250, 254, .78);
      --text: #25325c;
      --muted: #7d8db4;
      --line: rgba(255, 255, 255, .62);
      --brand: #42dda1;
      --brand-dark: #16b881;
      --blue: #1aa8ff;
      --amber: #d97706;
      --red: #dc2626;
      --cyan: #31d6f5;
      --shadow: 0 22px 48px rgba(52, 96, 154, .18);
      --soft-shadow: 0 14px 34px rgba(57, 128, 196, .14);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: Kanit, Sarabun, system-ui, sans-serif; font-size: 14px;
      background:
        linear-gradient(120deg, rgba(255,255,255,.26), transparent 34%),
        linear-gradient(180deg, #b8edf8 0%, #c8f3fb 48%, #e9fbfe 100%);
    }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    .app {
      max-width: 430px; min-height: 100vh; margin: 0 auto; padding-bottom: calc(92px + var(--safe-bottom));
      position: relative; overflow: hidden;
      background:
        linear-gradient(142deg, rgba(20, 145, 255, .92) 0 24%, transparent 24% 37%, rgba(66,221,161,.88) 37% 52%, transparent 52%),
        linear-gradient(180deg, rgba(255,255,255,.46) 0, rgba(255,255,255,.76) 230px, rgba(247,253,255,.94) 430px);
      box-shadow: 0 0 70px rgba(34, 93, 142, .20);
    }
    .app::before {
      content: ''; position: absolute; inset: 78px -58px auto auto; width: 260px; height: 360px;
      background: linear-gradient(150deg, rgba(26,168,255,.22), rgba(66,221,161,.48));
      border-radius: 72px; transform: rotate(18deg); pointer-events: none;
    }
    .topbar {
      position: sticky; top: 0; z-index: 20; padding: 18px 18px 14px;
      background: rgba(255, 255, 255, .10); backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, .22);
    }
    .brand-row { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 44px; height: 44px; border-radius: 16px; object-fit: cover; background: rgba(255,255,255,.74); color: var(--blue); display: grid; place-items: center; font-size: 22px; flex: 0 0 auto; box-shadow: var(--soft-shadow); }
    .title { font-size: 18px; font-weight: 700; line-height: 1.2; color: #fff; text-shadow: 0 1px 14px rgba(38,83,147,.18); }
    .subtitle { color: rgba(255,255,255,.86); font-size: 12px; margin-top: 2px; }
    .content { position: relative; z-index: 1; padding: 16px 18px 24px; }
    .panel {
      background: var(--surface); border: 1px solid var(--line); border-radius: 22px;
      box-shadow: var(--shadow); padding: 16px; margin-bottom: 14px;
      backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
    }
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .section-title { font-size: 16px; font-weight: 700; }
    .grid { display: grid; gap: 10px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .metric { padding: 14px; border: 1px solid rgba(255,255,255,.72); border-radius: 18px; background: rgba(255,255,255,.66); box-shadow: var(--soft-shadow); }
    .metric b { display: block; font-size: 22px; line-height: 1.1; }
    .metric span { color: var(--muted); font-size: 12px; }
    .check-hero {
      min-height: 278px;
      position: relative; overflow: hidden; color: #fff; border: 1px solid rgba(255,255,255,.52);
      background:
        linear-gradient(128deg, rgba(26,168,255,.98) 0 42%, rgba(49,214,245,.82) 42% 56%, rgba(66,221,161,.96) 56% 100%);
      box-shadow: 0 26px 58px rgba(26, 168, 255, .24);
    }
    .check-hero::after {
      content: ''; position: absolute; inset: -84px auto auto -54px; width: 260px; height: 330px;
      border-radius: 68px; background: rgba(23, 99, 237, .40); transform: rotate(18deg); pointer-events: none;
    }
    .check-hero .section-title, .check-hero .subtitle { color: #fff; }
    .clock-face { position: relative; z-index: 1; display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }
    .clock-time { font-size: 46px; font-weight: 800; line-height: 1; letter-spacing: 0; }
    .clock-date { opacity: .84; font-size: 12px; margin-top: 6px; }
    .status-pill { position: relative; z-index: 1; display: inline-flex; align-items: center; gap: 7px; min-height: 34px; padding: 6px 12px; border-radius: 999px; background: rgba(255,255,255,.24); border: 1px solid rgba(255,255,255,.32); font-weight: 700; font-size: 12px; }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; background: #fff; box-shadow: 0 0 0 4px rgba(255,255,255,.16); }
    .check-action {
      position: relative; z-index: 1; width: 136px; height: 136px; border-radius: 50%; margin: 18px auto 4px;
      color: #24a4e8; background: rgba(255,255,255,.84); border: 8px solid rgba(255,255,255,.34);
      display: grid; place-items: center; align-content: center; gap: 5px; box-shadow: 0 18px 42px rgba(29, 107, 174, .28);
    }
    .check-action i { font-size: 38px; line-height: 1; }
    .check-action span { font-size: 14px; font-weight: 800; }
    .check-action.out { color: #fff; background: rgba(37,99,235,.94); }
    .check-action.done { color: #fff; background: rgba(100,116,139,.90); }
    .check-action:disabled { opacity: .72; }
    .camera-box { overflow: hidden; border: 1px solid rgba(255,255,255,.7); border-radius: 22px; background: rgba(255,255,255,.56); box-shadow: var(--soft-shadow); }
    .camera-frame { position: relative; aspect-ratio: 4 / 3; background: linear-gradient(135deg, #eefbff, #d7f4ff); display: grid; place-items: center; color: #7d8db4; }
    .camera-frame video, .camera-frame img { width: 100%; height: 100%; object-fit: cover; }
    .camera-frame video { transform: scaleX(-1); }
    .camera-frame img.selfie-preview { transform: scaleX(-1); }
    .camera-placeholder { display: grid; place-items: center; gap: 8px; text-align: center; padding: 20px; }
    .camera-placeholder i { font-size: 34px; color: #94a3b8; }
    .camera-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: rgba(255,255,255,.68); }
    .signal-list { display: grid; gap: 8px; }
    .signal-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 12px; border-bottom: 1px solid rgba(255,255,255,.56); background: rgba(255,255,255,.42); border-radius: 16px; }
    .signal-list { display: grid; gap: 8px; }
    .signal-row:last-child { border-bottom: 0; }
    .signal-label { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); }
    .signal-label i { color: var(--brand-dark); }
    .signal-value { font-weight: 700; text-align: right; }
    .distance-ok { color: #166534; }
    .distance-warn { color: #92400e; }
    .distance-bad { color: #991b1b; }
    .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .menu-tile { min-height: 90px; border-radius: 20px; background: rgba(255,255,255,.66); border: 1px solid rgba(255,255,255,.72); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; color: var(--text); box-shadow: var(--soft-shadow); backdrop-filter: blur(14px); }
    .menu-tile i { font-size: 23px; color: var(--blue); }
    .menu-tile.active { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(6, 199, 85, .16) inset; }
    .form { display: grid; gap: 10px; }
    .field { display: grid; gap: 5px; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 600; }
    .field input, .field select, .field textarea {
      width: 100%; min-height: 44px; border-radius: 18px; border: 1px solid rgba(255,255,255,.72);
      background: rgba(255,255,255,.74); color: var(--text); padding: 9px 12px; outline: none;
    }
    .field textarea { min-height: 82px; resize: vertical; }
    .file-drop {
      position: relative; min-height: 96px; border-radius: 22px; border: 1px dashed rgba(26,168,255,.46);
      background: rgba(255,255,255,.54); display: grid; place-items: center; text-align: center;
      padding: 14px; color: var(--muted); box-shadow: var(--soft-shadow); overflow: hidden;
    }
    .file-drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .file-drop i { display: block; font-size: 28px; color: var(--blue); margin-bottom: 6px; }
    .file-drop strong { display: block; color: var(--text); font-size: 13px; }
    .file-preview { display: grid; grid-template-columns: 56px 1fr auto; align-items: center; gap: 10px; padding: 10px; border-radius: 18px; background: rgba(255,255,255,.60); border: 1px solid rgba(255,255,255,.70); }
    .file-preview img { width: 56px; height: 56px; border-radius: 14px; object-fit: cover; background: #e8f8ff; }
    .file-preview .file-icon { width: 56px; height: 56px; border-radius: 14px; display: grid; place-items: center; background: #e8f8ff; color: var(--blue); font-size: 24px; }
    .file-preview b { display: block; font-size: 13px; line-height: 1.25; word-break: break-word; }
    .file-preview span { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }
    .receipt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
    .receipt-card { position: relative; aspect-ratio: 1; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,.72); background: rgba(255,255,255,.66); box-shadow: var(--soft-shadow); }
    .receipt-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .receipt-card button { position: absolute; top: 5px; right: 5px; width: 24px; height: 24px; border-radius: 50%; background: rgba(220,38,38,.92); color: #fff; display: grid; place-items: center; font-size: 12px; }
    .file-note { font-size: 11px; color: var(--muted); text-align: center; margin-top: 7px; }
    .btn { min-height: 44px; border-radius: 18px; padding: 9px 14px; display: inline-flex; align-items: center; justify-content: center; gap: 7px; font-weight: 700; box-shadow: var(--soft-shadow); }
    .btn-primary { background: linear-gradient(135deg, var(--cyan), var(--brand)); color: #fff; }
    .btn-secondary { background: rgba(255,255,255,.64); color: var(--text); border: 1px solid rgba(255,255,255,.72); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-blue { background: var(--blue); color: #fff; }
    .btn:disabled { opacity: .55; cursor: wait; }
    .list { display: grid; gap: 10px; }
    .item { border: 1px solid rgba(255,255,255,.72); border-radius: 18px; background: rgba(255,255,255,.64); padding: 12px; box-shadow: var(--soft-shadow); }
    .item-main { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .item-title { font-weight: 700; line-height: 1.3; }
    .item-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .badge { display: inline-flex; align-items: center; min-height: 24px; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; white-space: nowrap; background: var(--surface-2); color: var(--muted); }
    .badge.pending, .badge.checked, .badge.reviewed { background: #fef3c7; color: #92400e; }
    .badge.approved { background: #dcfce7; color: #166534; }
    .badge.rejected, .badge.cancelled { background: #fee2e2; color: #991b1b; }
    .actions { display: flex; gap: 8px; margin-top: 10px; }
    .actions .btn { flex: 1; min-height: 38px; font-size: 13px; }
    .bottom-nav {
      position: fixed; left: 50%; bottom: 0; transform: translateX(-50%); z-index: 30;
      width: min(430px, calc(100% - 24px)); bottom: 12px; border-radius: 28px;
      background: rgba(255, 255, 255, .78); backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,.72); padding: 8px 8px calc(8px + var(--safe-bottom));
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px;
      box-shadow: 0 20px 46px rgba(74, 125, 177, .18);
    }
    .nav-btn { min-width: 0; min-height: 54px; border-radius: 20px; color: #b6d9e8; background: transparent; display: grid; place-items: center; gap: 2px; }
    .nav-btn i { font-size: 20px; }
    .nav-btn span { font-size: 10px; line-height: 1; }
    .nav-btn.active { color: var(--blue); background: rgba(235, 251, 255, .9); }
    .hidden { display: none !important; }
    .empty { color: var(--muted); text-align: center; padding: 22px 8px; }
    .toast {
      position: fixed; left: 50%; bottom: calc(86px + var(--safe-bottom)); transform: translateX(-50%);
      z-index: 60; width: min(492px, calc(100% - 28px)); background: #102033; color: #fff;
      border-radius: 8px; padding: 11px 13px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 8px;
    }
    .toast.error { background: #991b1b; }
    .toast.success { background: #166534; }
    .boot, .login {
      min-height: 100vh; display: grid; place-items: center; padding: 24px; background: var(--bg);
    }
    .boot-card, .login-card { width: min(420px, 100%); }
    .boot-logo { width: 70px; height: 70px; border-radius: 18px; background: var(--brand); color: #fff; display: grid; place-items: center; font-size: 34px; margin-bottom: 14px; }
    @media (max-width: 380px) {
      .content { padding-left: 10px; padding-right: 10px; }
      .menu-grid { grid-template-columns: repeat(2, 1fr); }
      .nav-btn span { font-size: 9px; }
    }
    /* Training Styles */
    .course-card { display: flex; flex-direction: column; overflow: hidden; margin-bottom: 12px; }
    .course-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 12px; }
    .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; margin-bottom: 12px; }
    .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    .quiz-question-card { margin-bottom: 14px; border-bottom: 1px dashed var(--line); padding-bottom: 14px; }
    .quiz-question-card:last-child { border: 0; }
    .quiz-option-item { display: flex; align-items: center; gap: 8px; margin-top: 6px; padding: 10px; border-radius: 8px; background: rgba(255,255,255,.5); border: 1px solid var(--line); }
    .quiz-option-item input { margin: 0; width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div id="boot" class="boot">
    <div class="boot-card">
      <div class="boot-logo"><i class="bi bi-line"></i></div>
      <div class="title">Avarin LMS LIFF</div>
      <div class="subtitle" id="bootText">กำลังเชื่อมต่อ LINE และ Supabase</div>
    </div>
  </div>

  <div id="login" class="login hidden">
    <div class="login-card panel">
      <div class="section-title">เชื่อมบัญชี LINE</div>
      <p class="subtitle">LINE นี้ยังไม่ผูกกับผู้ใช้ในระบบ LMS เข้าสู่ระบบหนึ่งครั้งเพื่อเชื่อมบัญชี</p>
      <form id="linkForm" class="form">
        <div class="field">
          <label>Username</label>
          <input id="loginUsername" autocomplete="username" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input id="loginPassword" type="password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary" type="submit"><i class="bi bi-link-45deg"></i> เชื่อมบัญชี</button>
      </form>
    </div>
  </div>

  <main id="app" class="app hidden">
    <header class="topbar">
      <div class="brand-row">
        <img id="lineAvatar" class="avatar hidden" alt="">
        <div id="fallbackAvatar" class="avatar"><i class="bi bi-person"></i></div>
        <div>
          <div class="title" id="pageTitle">Dashboard</div>
          <div class="subtitle" id="userLine">LINE OA / LIFF</div>
        </div>
      </div>
    </header>

    <section id="view" class="content"></section>

    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-btn active" data-route="dashboard" aria-label="Dashboard"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></button>
      <button class="nav-btn" data-route="checkin" aria-label="Check In"><i class="bi bi-geo-alt-fill"></i><span>Check In</span></button>
      <button class="nav-btn" data-route="leave" aria-label="Leave"><i class="bi bi-calendar2-check"></i><span>Leave</span></button>
      <button class="nav-btn" data-route="expenses" aria-label="Expenses"><i class="bi bi-receipt"></i><span>Expenses</span></button>
      <button class="nav-btn" data-route="approval" aria-label="Approval"><i class="bi bi-check2-square"></i><span>Approval</span></button>
      <button class="nav-btn" data-route="profile" aria-label="Profile"><i class="bi bi-person-circle"></i><span>Profile</span></button>
    </nav>
  </main>

  <script>
    const CONFIG = {
      LIFF_ID: new URLSearchParams(location.search).get('liffId') || '2010506774-q6zR6OoB',
      SUPABASE_URL: 'https://djcvqxjwakiorahdiwwk.supabase.co',
      SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqY3ZxeGp3YWtpb3JhaGRpd3drIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NDk4MjUsImV4cCI6MjA5NzQyNTgyNX0.efr2QuUfbk8WNK8I9A-ga4OKzJal7w_dNKoICXX1nPQ',
      COMPANY_LAT: Number(new URLSearchParams(location.search).get('officeLat') || localStorage.getItem('office_lat') || NaN),
      COMPANY_LNG: Number(new URLSearchParams(location.search).get('officeLng') || localStorage.getItem('office_lng') || NaN),
      COMPANY_RADIUS_M: Number(new URLSearchParams(location.search).get('officeRadius') || localStorage.getItem('office_radius_m') || 200),
      BRANCHES: [
        { id: 'office',       name: 'ออฟฟิต',                                    lat: 13.807558,  lng: 100.453157, radius: 200 },
        { id: 'crystal_sb',   name: 'สาขา Crystal SB ราชพฤกษ์',                  lat: 13.809389,  lng: 100.448361, radius: 200 },
        { id: 'crystal_ekmai',name: 'สาขา The Crystal เลียบด่วนเอกมัย-รามอินทรา', lat: 13.811656,  lng: 100.619054, radius: 200 },
        { id: 'porto_chino',  name: 'สาขา Porto Chino',                           lat: 13.569572,  lng: 100.288989, radius: 200 }
      ]
    };

    const Store = { token: '', user: null, caps: [], liffProfile: null, route: 'dashboard', cache: {}, checkinPhoto: '', checkinGeo: null, cameraStream: null, clockTimer: null, selectedBranchId: 'office' };
    const $ = (s, root = document) => root.querySelector(s);
    const esc = (v) => String(v == null ? '' : v).replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    const today = () => new Date(Date.now() + 7 * 3600000).toISOString().slice(0, 10);
    const money = (n) => Number(n || 0).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const dateTH = (v) => v ? new Date(String(v).slice(0, 10) + 'T00:00:00+07:00').toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: 'numeric' }) : '-';
    const statusText = (s) => ({ pending: 'รอดำเนินการ', checked: 'ตรวจแล้ว', reviewed: 'รออนุมัติ', approved: 'อนุมัติ', rejected: 'ไม่อนุมัติ', cancelled: 'ยกเลิก', draft: 'ร่าง' }[s] || s || '-');
    const hasCap = (cap) => Store.caps.includes(cap) || Store.caps.includes(cap.split('.')[0] + '.manage');
    const hasOfficeLocation = () => CONFIG.BRANCHES.length > 0 || (Number.isFinite(CONFIG.COMPANY_LAT) && Number.isFinite(CONFIG.COMPANY_LNG));
    const formatMeters = (m) => !Number.isFinite(m) ? '-' : (m < 1000 ? `${Math.round(m)} m` : `${(m / 1000).toFixed(2)} km`);
    const distanceTone = (m, radius) => { const r = radius || CONFIG.COMPANY_RADIUS_M; return !Number.isFinite(m) ? '' : (m <= r ? 'distance-ok' : m <= r * 2 ? 'distance-warn' : 'distance-bad'); };
    const getSelectedBranch = () => CONFIG.BRANCHES.find(b => b.id === Store.selectedBranchId) || CONFIG.BRANCHES[0];
    const timeOnly = (v) => v ? new Date(v).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) : '-';

    async function api(action, payload = {}, token = Store.token) {
      const res = await fetch(CONFIG.SUPABASE_URL + '/functions/v1/api', {
        method: 'POST',
        headers: { apikey: CONFIG.SUPABASE_KEY, Authorization: 'Bearer ' + CONFIG.SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, token, payload })
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok || !json.ok) throw new Error(json.error || 'API error');
      return json.data;
    }

    function show(id) {
      ['boot', 'login', 'app'].forEach((x) => $('#' + x).classList.toggle('hidden', x !== id));
    }

    function toast(text, type = 'success') {
      $('.toast')?.remove();
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.innerHTML = `<i class="bi bi-${type === 'error' ? 'x-circle-fill' : 'check-circle-fill'}"></i><span>${esc(text)}</span>`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }

    async function boot() {
      try {
        if (CONFIG.LIFF_ID !== 'YOUR_LIFF_ID') {
          await liff.init({ liffId: CONFIG.LIFF_ID });

    function buildGeoPayload(latitude, longitude) {
      const branch = getSelectedBranch();
      const distance = branch ? distanceMeters(latitude, longitude, branch.lat, branch.lng) : null;
      return {
        latitude,
        longitude,
        distance_m: distance,
        branch_id: branch?.id || '',
        branch_name: branch?.name || '',
        location: `${latitude.toFixed(6)},${longitude.toFixed(6)}${Number.isFinite(distance) ? ` · ${formatMeters(distance)} from ${branch?.name || 'office'}` : ''}`
      };
    }

    function distanceMeters(lat1, lon1, lat2, lon2) {
      const toRad = (v) => v * Math.PI / 180;
      const earth = 6371000;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return earth * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    async function refreshGps() {

        return geo;
      }
      if (gpsEl) gpsEl.textContent = `${geo.latitude.toFixed(5)}, ${geo.longitude.toFixed(5)}`;
      if (distanceEl) {
        if (Number.isFinite(geo.distance_m)) {

    function captureSelfie() {
      const video = $('#selfieVideo');
      if (!video) return toast('กรุณาเปิดกล้องก่อน', 'error');
      const canvas = document.createElement('canvas');
      const width = Math.min(video.videoWidth || 720, 720);
      const height = Math.round(width * ((video.videoHeight || 540) / (video.videoWidth || 720)));
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(video, 0, 0, width, height);
      Store.checkinPhoto = canvas.toDataURL('image/jpeg', 0.72);
      $('#cameraFrame').innerHTML = `<img class="selfie-preview" src="${Store.checkinPhoto}" alt="Selfie preview">`;
      $('#selfieBadge').textContent = 'Ready';
      $('#selfieBadge').classList.add('approved');

      stopCamera();

        return;
      }
      const size = file.size < 1024 * 1024 ? `${Math.ceil(file.size / 1024)} KB` : `${(file.size / 1024 / 1024).toFixed(2)} MB`;
      const isImage = file.type.startsWith('image/');

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error || new Error('อ่านไฟล์ไม่สำเร็จ'));
        reader.readAsDataURL(file);
      });
    }

    function safeFileName(name) {
      return String(name || 'receipt').toLowerCase().replace(/[^a-z0-9._-]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 80) || 'receipt';
    }

    async function uploadReceiptFile(file) {
      if (!file) return '';
      
      const scriptUrl = Store.settings?.google_apps_script_url;
      if (scriptUrl) {
        try {
          const base64 = await readFileAsDataUrl(file);
          const res = await fetch(scriptUrl, {
            method: 'POST',
            body: JSON.stringify({
              name: safeFileName(file.name),
              type: file.type || 'application/octet-stream',
              base64: base64
            })
          });
          if (!res.ok) throw new Error('Google Apps Script response error');
          const json = await res.json();
          if (json.ok && json.url) {
            return json.url;
          }
          throw new Error(json.error || 'Google Apps Script returned failed status');
        } catch (err) {
          console.warn('Google Drive upload failed, falling back to Supabase:', err);
        }
      }

      const path = `liff/${Store.user?.id || 'user'}/${Date.now()}-${crypto.randomUUID()}-${safeFileName(file.name)}`;
      const uploadUrl = `${CONFIG.SUPABASE_URL}/storage/v1/object/receipts/${path.split('/').map(encodeURIComponent).join('/')}`;
      try {
        const res = await fetch(uploadUrl, {
          method: 'PUT',
          headers: {
            apikey: CONFIG.SUPABASE_KEY,
            Authorization: 'Bearer ' + CONFIG.SUPABASE_KEY,
            'Content-Type': file.type || 'application/octet-stream',
            'x-upsert': 'false'
          },
          body: file
        });
        if (!res.ok) throw new Error('Storage upload denied');
        return `${CONFIG.SUPABASE_URL}/storage/v1/object/public/receipts/${path.split('/').map(encodeURIComponent).join('/')}`;
      } catch (err) {
        if (file.size > 900 * 1024) throw new Error('อัปโหลดไฟล์ไม่สำเร็จ และไฟล์ใหญ่เกินไปสำหรับแนบแบบสำรอง');
        return await readFileAsDataUrl(file);
      }
    }

    function compressReceiptImage(file) {
      return new Promise((resolve, reject) => {
        if (!file.type.startsWith('image/')) return reject(new Error('แนบได้เฉพาะรูปภาพเท่านั้น'));
        const reader = new FileReader();
        reader.onerror = () => reject(reader.error || new Error('อ่านรูปไม่สำเร็จ'));
        reader.onload = (event) => {
          const img = new Image();
          img.onerror = () => resolve(event.target.result);
          img.onload = () => {
            let maxSize = 600;
            let quality = 0.5;
            let dataUrl = '';
            for (let attempt = 0; attempt < 5; attempt++) {
              let w = img.width;
              let h = img.height;
              if (w > h && w > maxSize) {
                h *= maxSize / w;
                w = maxSize;
              } else if (h > maxSize) {
                w *= maxSize / h;
                h = maxSize;
              }
              const canvas = document.createElement('canvas');
              canvas.width = Math.max(1, Math.round(w));
              canvas.height = Math.max(1, Math.round(h));
              canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
              dataUrl = canvas.toDataURL('image/jpeg', quality);
              if (dataUrl.length <= 48000) break;
              maxSize = Math.round(maxSize * 0.8);
              quality = Math.max(0.2, quality - 0.1);
            }
            resolve(dataUrl || event.target.result);
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

      }
      const files = selected.slice(0, available);
      if (selected.length > available) toast('แนบรูปได้สูงสุด 4 รูปเท่านั้น', 'error');
      try {
        toast('กำลังประมวลผลรูปภาพ...');
        const compressed = await Promise.all(files.map(compressReceiptImage));
        Store.expenseReceipts.push(...compressed);
        renderReceiptPreviewGrid();
        input.value = '';
      } catch (err) {
        toast(err.message, 'error');
      }
    }

                    <h3 class="section-title" style="font-size:20px;margin-top:14px;color:var(--brand-dark)">ยินดีด้วย คุณสอบผ่านแล้ว!</h3>
                    <div style="font-size:46px;font-weight:800;margin:14px 0">${scoreRes.score}/${scoreRes.total}</div>
                    <div style="font-size:14px;color:var(--muted);margin-bottom:20px">คะแนนของคุณคิดเป็น ${scoreRes.percentage}% (เกณฑ์การผ่านคือ 80%)</div>
                    <button class="btn btn-primary" id="finish-quiz-btn" style="width:100%">ตกลง</button>
                  </div>`;
              } else {
                resultHtml = `
                  <div style="text-align:center;padding:20px">
                    <i class="bi bi-x-circle-fill" style="font-size:64px;color:var(--red)"></i>
                    <h3 class="section-title" style="font-size:20px;margin-top:14px;color:var(--red)">คุณยังไม่ผ่านเกณฑ์การทดสอบ</h3>
                    <div style="font-size:46px;font-weight:800;margin:14px 0">${scoreRes.score}/${scoreRes.total}</div>
                    <div style="font-size:14px;color:var(--muted);margin-bottom:20px">คะแนนของคุณคิดเป็น ${scoreRes.percentage}% (เกณฑ์การผ่านคือ 80%)</div>
                    <div style="display:flex;gap:10px">
                      <button class="btn btn-primary" id="retry-quiz-btn" style="flex:1">ทำข้อสอบอีกครั้ง</button>
                      <button class="btn btn-secondary" id="finish-quiz-btn" style="flex:1">กลับหน้าบทเรียน</button>
                    </div>
                  </div>`;
              }
              
              listDiv.innerHTML = `<div class="panel">${resultHtml}</div>`;
              
              const finishBtn = $('#finish-quiz-btn');
              if (finishBtn) {
                finishBtn.onclick = () => {
                  Store.trainingState = 'list';
                  training();
                };
              }
              
              const retryBtn = $('#retry-quiz-btn');
              if (retryBtn) {
                retryBtn.onclick = () => {
                  Store.trainingState = 'quiz';
                  training();
                };
              }
            } catch (err) {
              toast(err.message, 'error');
              Store.trainingState = 'study';
              training();
            }
          };
          
        } catch (err) {
          listDiv.innerHTML = `<div class="panel empty">${esc(err.message)}</div>`;
        }
      }
    }

    function getYoutubeEmbedUrl(url) {
      if (!url) return '';
      var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      var match = url.match(regExp);
      if (match && match[2].length == 11) {
        return 'https://www.youtube.com/embed/' + match[2];
      }
      return '';
    }

    $('#bottomNav').addEventListener('click', (e) => {
      const btn = e.target.closest('.nav-btn');
      if (btn) route(btn.dataset.route);
    });

    $('#linkForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const auth = await api('auth.login', {
          username: $('#loginUsername').value,
          password: $('#loginPassword').value,
          user_agent: 'LINE_LIFF_LINK'
        }, '');
        setSession(auth);
        if (Store.liffProfile?.userId) {
          await api('auth.link_line', { line_user_id: Store.liffProfile.userId });
          localStorage.setItem('dev_line_user_id', Store.liffProfile.userId);
        }
        renderShell();
        await route('dashboard');
        show('app');
        toast('เชื่อมบัญชี LINE สำเร็จ');
      } catch (err) { toast(err.message, 'error'); }
    });

    boot();
  </script>
</body>
</html>
